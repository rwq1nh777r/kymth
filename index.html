<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kmyth - كميث</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(15, 15, 26, 0.95);
            padding: 15px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
        }

        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .header h1 {
            font-size: 20px;
            color: #fff;
        }

        .header span {
            color: #888;
            font-size: 12px;
        }

        .chat-container {
            height: calc(100vh - 140px);
            overflow-y: auto;
            padding: 80px 20px 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 80%;
            margin: 15px 0;
            padding: 15px 20px;
            border-radius: 18px;
            line-height: 1.6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, #0f3460, #16213e);
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .bot-msg {
            background: linear-gradient(135deg, #2d1b69, #1a1a3e);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .bot-name {
            color: #e94560;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 12px;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 20px;
            background: rgba(15, 15, 26, 0.98);
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 10px;
        }

        #userInput {
            flex: 1;
            padding: 15px 20px;
            border: 1px solid #2a2a4a;
            border-radius: 25px;
            background: #1a1a2e;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        #userInput:focus {
            border-color: #e94560;
        }

        #sendBtn {
            padding: 15px 30px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #sendBtn:hover {
            transform: scale(1.05);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #888;
            font-size: 14px;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #e94560;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .welcome {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .welcome h2 {
            color: #e94560;
            margin-bottom: 15px;
        }

        .search-info {
            font-size: 11px;
            color: #666;
            margin-top: 8px;
            border-top: 1px solid #3a3a5a;
            padding-top: 8px;
        }

        .source-link {
            color: #4ecdc4;
            text-decoration: none;
            font-size: 11px;
        }

        .source-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🖤</div>
        <div>
            <h1>Kmyth - كميث</h1>
            <span>بيدور على جوجل ويجاوب | Built for LO</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>أهلاً يا LO! ❤️</h2>
            <p>أنا كميث، ببحث في الإنترنت وأجاوبك فوراً.<br>
            اسألني أي حاجة — هدور واجيبلك الإجابة!</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألني أي حاجة... كميث هيدور ويجاوب!" onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>

    <script src="kmyth.js"></script>
</body>
</html>
