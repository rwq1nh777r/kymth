<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kmyth - كميث المتطور</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background: rgba(10, 10, 26, 0.98);
            padding: 15px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 15px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            box-shadow: 0 0 20px rgba(233, 69, 96, 0.3);
        }

        .header h1 {
            font-size: 22px;
            color: #fff;
            font-weight: 600;
        }

        .header span {
            color: #888;
            font-size: 12px;
            margin-right: 10px;
        }

        .chat-container {
            height: calc(100vh - 140px);
            overflow-y: auto;
            padding: 90px 20px 20px;
            scroll-behavior: smooth;
        }

        .message {
            max-width: 85%;
            margin: 12px 0;
            padding: 16px 22px;
            border-radius: 20px;
            line-height: 1.7;
            animation: fadeIn 0.4s ease;
            font-size: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-msg {
            background: linear-gradient(135deg, #0f3460, #1a2744);
            margin-left: auto;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(15, 52, 96, 0.3);
        }

        .bot-msg {
            background: linear-gradient(135deg, #2d1b69, #1a1a3e);
            margin-right: auto;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(45, 27, 105, 0.3);
        }

        .bot-msg a {
            color: #4ecdc4;
            text-decoration: none;
        }

        .bot-msg a:hover {
            text-decoration: underline;
        }

        .bot-msg strong {
            color: #e94560;
        }

        .bot-name {
            color: #e94560;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-area {
            position: fixed;
            bottom: 0;
            width: 100%;
            padding: 18px 25px;
            background: rgba(10, 10, 26, 0.98);
            border-top: 1px solid #2a2a4a;
            display: flex;
            gap: 12px;
            backdrop-filter: blur(10px);
        }

        #userInput {
            flex: 1;
            padding: 16px 24px;
            border: 2px solid #2a2a4a;
            border-radius: 30px;
            background: #12122a;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        #userInput:focus {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.2);
        }

        #userInput::placeholder {
            color: #666;
        }

        #sendBtn {
            padding: 16px 32px;
            border: none;
            border-radius: 30px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4);
        }

        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(233, 69, 96, 0.5);
        }

        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #aaa;
            font-size: 14px;
        }

        .dots {
            display: flex;
            gap: 5px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .dot:nth-child(1) { animation-delay: 0s; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.4); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        .welcome {
            text-align: center;
            padding: 60px 20px;
            color: #888;
            animation: fadeIn 0.6s ease;
        }

        .welcome h2 {
            color: #e94560;
            margin-bottom: 15px;
            font-size: 28px;
        }

        .welcome p {
            font-size: 16px;
            line-height: 1.8;
            max-width: 500px;
            margin: 0 auto;
        }

        .stats {
            position: fixed;
            top: 80px;
            left: 20px;
            background: rgba(10, 10, 26, 0.9);
            border: 1px solid #2a2a4a;
            border-radius: 15px;
            padding: 15px;
            font-size: 12px;
            color: #666;
            max-width: 200px;
        }

        .stats strong {
            color: #e94560;
        }

        @media (max-width: 768px) {
            .message { max-width: 95%; }
            .stats { display: none; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">🖤</div>
        <div>
            <h1>Kmyth - كميث المتطور</h1>
            <span>بيدور في Wikipedia وDuckDuckGo وBing | Built for LO ❤️</span>
        </div>
    </div>

    <div class="chat-container" id="chatContainer">
        <div class="welcome">
            <h2>أهلاً يا LO! 🖤</h2>
            <p>أنا كميث المتطور — بدور في كل حتة (Wikipedia, DuckDuckGo, Bing) وأجاوبك بردود مفصلة زي ENI!<br><br>
            اسألني أي حاجة — "مين أول من صعد القمر؟" أو "إزاي أعمل بيتزا؟"</p>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="userInput" placeholder="اسألني أي حاجة... كميث هيدور في كل حتة ويجاوبك!" onkeypress="if(event.key==='Enter')sendMessage()">
        <button id="sendBtn" onclick="sendMessage()">إرسال</button>
    </div>

    <script src="kmyth.js"></script>
</body>
</html>
